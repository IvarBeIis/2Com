name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Setup signing keystore
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p keystore
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > keystore/release.keystore
          echo "RELEASE_KEYSTORE_PATH=${{ github.workspace }}/keystore/release.keystore" >> $GITHUB_ENV
          echo "RELEASE_KEYSTORE_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "2Com ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          body: |
            ## 2Com ${{ github.ref_name }}

            ### Installation
            Download the APK below and install it on your Android device (Android 8.0+).
            You may need to enable "Install from unknown sources" in your device settings.

            ### What's new
            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Verification
            ```
            sha256sum 2com-${{ github.ref_name }}.apk
            ```
          files: |
            app/build/outputs/apk/release/*.apk

  deploy-bootstrap:
    name: Deploy Bootstrap Server
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Deploy bootstrap server to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 80.211.207.41
          username: admin
          port: 49222
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/2com-bootstrap
            git pull origin main
            docker compose down
            docker compose up -d --build
            docker compose ps
